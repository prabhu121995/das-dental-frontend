  <path d="M111 98c0-3.3 2.7-6 6-6h6c3.3 0 6 2.7 6 6v18h18c3.3 0 6 2.7 6 6v6c0 3.3-2.7 6-6 6h-18v18c0 3.3-2.7 6-6 6h-6c-3.3 0-6-2.7-6-6v-18H93c-3.3 0-6-2.7-6-6v-6c0-3.3 2.7-6 6-6h18V98Z"
